stages:
  - verify
  - build

variables:
  GIT_STRATEGY: fetch
  APP_ENV: ci
  APP_NAME: Template App
  BRAND_NAME: Template Brand
  APPLICATION_ID: com.example.template.app
  API_BASE_URL: https://api.example.com

default:
  tags:
    - docker
    - ct102
    - local

verify_template:
  stage: verify
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/i'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  script:
    - 'set -euo pipefail'
    - 'docker compose build'
    - 'docker compose run --rm flutter bash -lc "flutter pub get"'
    - 'docker compose run --rm flutter bash -lc "dart format --output=none --set-exit-if-changed ."'
    - 'docker compose run --rm flutter bash -lc "flutter analyze"'
    - 'docker compose run --rm flutter bash -lc "flutter test"'
    - 'docker compose run --rm flutter bash -lc "dart run build_runner build --delete-conflicting-outputs"'
    - 'git diff --exit-code'
    - >
      docker compose run --rm flutter bash -lc
      "flutter build web --release
      --dart-define=APP_ENV=${APP_ENV}
      --dart-define=APP_NAME='${APP_NAME}'
      --dart-define=BRAND_NAME='${BRAND_NAME}'
      --dart-define=APPLICATION_ID=${APPLICATION_ID}
      --dart-define=API_BASE_URL=${API_BASE_URL}"

build_web_artifact:
  stage: build
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/i'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
    - when: never
  script:
    - 'set -euo pipefail'
    - 'docker compose build'
    - 'docker compose run --rm flutter bash -lc "flutter pub get"'
    - >
      docker compose run --rm flutter bash -lc
      "flutter build web --release
      --dart-define=APP_ENV=prod
      --dart-define=APP_NAME='${APP_NAME}'
      --dart-define=BRAND_NAME='${BRAND_NAME}'
      --dart-define=APPLICATION_ID=${APPLICATION_ID}
      --dart-define=API_BASE_URL=${API_BASE_URL}"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/web/
