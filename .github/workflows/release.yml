name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: Template App
  BRAND_NAME: Template Brand
  APPLICATION_ID: com.example.template.app
  API_BASE_URL: https://api.example.com
  REQUIRE_ANDROID_SIGNING: 'false'
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: >
          flutter build web --release
          --dart-define=APP_ENV=prod
          --dart-define="APP_NAME=${APP_NAME}"
          --dart-define="BRAND_NAME=${BRAND_NAME}"
          --dart-define="APPLICATION_ID=${APPLICATION_ID}"
          --dart-define="API_BASE_URL=${API_BASE_URL}"

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-web
          path: build/web/
          if-no-files-found: error

  android-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing
        run: bash scripts/setup-android-signing.sh

      - name: Build Android App Bundle
        run: >
          flutter build appbundle --release
          --dart-define=APP_ENV=prod
          --dart-define="APP_NAME=${APP_NAME}"
          --dart-define="BRAND_NAME=${BRAND_NAME}"
          --dart-define="APPLICATION_ID=${APPLICATION_ID}"
          --dart-define="API_BASE_URL=${API_BASE_URL}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
